<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Pandemic Paradise Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Space+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container container--wide">

  <header class="site-header">
    <a href="index.html" class="logo">Pandemic Paradise</a>
    <nav class="site-nav">
      <a href="timeline.html">Timeline</a>
      <a href="gallery.html" class="active">Gallery</a>
      <a href="stories.html">Stories</a>
      <a href="community.html">Community</a>
      <a href="the-world.html">The World</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <section class="page-header">
    <span class="icon">📸</span>
    <h1>Gallery</h1>
    <p>Screenshots, videos, and builds from the world that was. Everything the community has preserved.</p>
  </section>

  <div class="gallery-filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="screenshot">Screenshots</button>
    <button class="filter-btn" data-filter="build">Builds</button>
    <button class="filter-btn" data-filter="video">Videos</button>
    <button class="filter-btn" data-filter="other">Other</button>
  </div>

  <div class="gallery-grid" id="gallery-grid"></div>

  <footer>
    <p>Built with <span class="heart">♥</span> by the PP community · 2026</p>
  </footer>

</div>

<script>
  // =============================================
  // CONFIG — Update this with your worker URL
  // =============================================
  const API_URL = 'https://pandemicparadise.colbysthickey.workers.dev';

  let allItems = [];
  let activeFilter = 'all';

  async function loadGallery() {
    try {
      const response = await fetch(`${API_URL}/gallery`);
      allItems = await response.json();
    } catch (e) {
      allItems = [];
    }
    renderGallery();
  }

  function renderGallery() {
    const grid = document.getElementById('gallery-grid');
    const filtered = activeFilter === 'all'
      ? allItems
      : allItems.filter(item => item.type === activeFilter);

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="gallery-empty">
          <div class="icon">📷</div>
          <h3>The archive is waiting</h3>
          <p>Screenshots, videos, and builds will appear here as the community submits them. If you have anything from the old server, now's the time.</p>
        </div>
      `;
      return;
    }

    grid.innerHTML = filtered.map((item, i) => {
      // Find the real index in allItems
      const realIndex = allItems.indexOf(item);
      return `
      <div class="gallery-item" data-type="${item.type}" data-index="${realIndex}">
        <div class="thumb">
          ${item.type === 'video'
            ? '<div class="placeholder">▶️</div>'
            : `<img src="${item.image}" alt="${item.title}" loading="lazy"
                onerror="this.parentElement.innerHTML='<div class=\\'placeholder\\'>📷</div>'">`
          }
          <span class="tag">${item.type}</span>
        </div>
        <div class="info">
          <h3>${item.title}</h3>
          ${item.caption ? `<p>${item.caption}</p>` : ''}
          <div class="meta">
            ${item.credit ? `Submitted by ${item.credit}` : ''}
            ${item.credit && item.year ? ' · ' : ''}
            ${item.year || ''}
          </div>
        </div>
      </div>
    `}).join('');
  }

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderGallery();
    });
  });

  // Lightbox with details
  document.getElementById('gallery-grid').addEventListener('click', (e) => {
    const item = e.target.closest('.gallery-item');
    if (!item) return;
    const img = item.querySelector('img');
    if (!img) return;

    const index = parseInt(item.dataset.index);
    const data = allItems[index];
    if (!data) return;

    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px;overflow-y:auto;';

    const container = document.createElement('div');
    container.style.cssText = 'max-width:900px;width:100%;display:flex;flex-direction:column;gap:0;';

    const imgWrap = document.createElement('div');
    imgWrap.style.cssText = 'width:100%;display:flex;align-items:center;justify-content:center;background:#000;';
    const fullImg = document.createElement('img');
    fullImg.src = img.src;
    fullImg.style.cssText = 'max-width:100%;max-height:70vh;object-fit:contain;display:block;';
    imgWrap.appendChild(fullImg);

    const infoBar = document.createElement('div');
    infoBar.style.cssText = 'background:#13131a;border:1px solid #1e1e2a;border-top:none;padding:20px 24px;';

    let metaParts = [];
    if (data.type) metaParts.push('<span style="font-family:\'Space Mono\',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border:1px solid #22633b;color:#4ade80;background:rgba(74,222,128,0.15)">' + data.type + '</span>');

    let detailParts = [];
    if (data.credit) detailParts.push('Submitted by ' + data.credit);
    if (data.year) detailParts.push(data.year);

    infoBar.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:${data.caption ? '10' : '0'}px;flex-wrap:wrap">
        <h3 style="font-family:'Silkscreen',monospace;font-size:14px;color:#e8e8ed;flex:1;min-width:200px">${data.title}</h3>
        ${metaParts.join('')}
      </div>
      ${data.caption ? `<p style="font-size:14px;line-height:1.7;color:#8888a0;margin-bottom:10px">${data.caption}</p>` : ''}
      ${detailParts.length ? `<div style="font-family:'Space Mono',monospace;font-size:11px;color:#55556a">${detailParts.join(' · ')}</div>` : ''}
    `;

    container.appendChild(imgWrap);
    container.appendChild(infoBar);
    overlay.appendChild(container);

    overlay.addEventListener('click', (ev) => {
      if (ev.target === overlay) overlay.remove();
    });

    // Close on Escape
    const closeOnEsc = (ev) => {
      if (ev.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', closeOnEsc); }
    };
    document.addEventListener('keydown', closeOnEsc);

    document.body.appendChild(overlay);
  });

  loadGallery();
</script>

</body>
</html>
